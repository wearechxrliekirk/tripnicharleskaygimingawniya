<!DOCTYPE html>
<html>
<head>
  <title>tripnicharleskaygimingawniya</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Lock Screen - No Overlaps Ever */
    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 30px;
    }
    #lockScreen h2 {
      font-size: 32px;
      display: flex;
      gap: 10px;
      text-shadow: 0 0 8px #00ffcc;
    }
    #nameInput {
      font-size: 24px;
      padding: 15px 30px;
      background: #111;
      color: #00ffcc;
      border: 2px solid #00ffcc;
      width: 400px;
      text-align: center;
      border-radius: 8px;
    }
    #accessBtn {
      font-size: 24px;
      padding: 12px 40px;
      background: #00ffcc;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    #accessBtn:hover {
      background: #fff;
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ffcc;
    }
    #errorMsg {
      font-size: 18px;
      color: red;
      text-shadow: 0 0 5px red;
      display: none;
    }

    /* Main System - Super Smooth */
    #mainSystem {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding-top: 120px;
      background-image: radial-gradient(circle, rgba(0,255,204,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      display: none;
    }
    h1 {
      font-size: 40px;
      animation: flicker 0.15s infinite alternate;
      margin-bottom: 80px;
    }
    @keyframes flicker {
      0% { opacity: 1; text-shadow: 0 0 5px #00ffcc; }
      100% { opacity: 0.9; text-shadow: 0 0 15px #00ffcc; }
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    #yesBtn {
      background: #00ffcc;
      border: 2px solid #00ffcc;
      color: #000;
      font-size: 22px;
      padding: 12px 25px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      left: calc(40% - 50px);
      top: 60%;
      animation: pulse 1.5s infinite;
    }
    #noBtn {
      background: #ff3333;
      border: 2px solid #ff3333;
      color: #fff;
      font-size: 22px;
      padding: 12px 25px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      left: calc(55% - 50px);
      top: 60%;
    }

    /* Confetti & Final Style */
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>
  <div id="lockScreen">
    <h2>🔒 RESTRICTED ACCESS 🔒</h2>
    <input type="text" id="nameInput" placeholder="ENTER AUTHORIZED NAME">
    <button id="accessBtn">VERIFY & ENTER</button>
    <div id="errorMsg">❌ UNAUTHORIZED - ACCESS DENIED ❌</div>
  </div>

  <div id="mainSystem">
    <h1 id="text">Initializing...</h1>
    <button id="yesBtn" onclick="yesClicked()">YES</button>
    <button id="noBtn">NO</button>
  </div>

<script>
  // Only Glen James Oyangoren can enter
  const authorizedName = "Glen James Oyangoren";
  const lockScreen = document.getElementById("lockScreen");
  const mainSystem = document.getElementById("mainSystem");
  const nameInput = document.getElementById("nameInput");
  const accessBtn = document.getElementById("accessBtn");
  const errorMsg = document.getElementById("errorMsg");

  // Smooth Verification
  function verifyName() {
    const input = nameInput.value.trim();
    if(input === authorizedName) {
      lockScreen.style.opacity = 0;
      setTimeout(() => { lockScreen.style.display = "none"; mainSystem.style.display = "block"; startSystem(); }, 500);
    } else {
      errorMsg.style.display = "block";
      nameInput.style.borderColor = "red";
      nameInput.animate([{transform: 'translateX(5px)'}, {transform: 'translateX(-5px)'}, {transform: 'translateX(0)'}], {duration: 300});
      setTimeout(() => nameInput.style.borderColor = "#00ffcc", 500);
    }
  }
  accessBtn.addEventListener("click", verifyName);
  nameInput.addEventListener("keypress", (e) => { if(e.key === "Enter") verifyName(); });

  // Fast & Smooth Message Sequence
  const messages = [
    "SYSTEM INITIALIZED...",
    "BREACH DETECTED...",
    "ACCESSING DATABASE...",
    "ANALYZING APPEARANCE...",
    "Gwapo ko? 😎",
    "PROCESSING FEELINGS...",
    "RESULT FOUND...",
    "Will you marry me? 💍"
  ];
  const textElement = document.getElementById("text");
  let i = 0;

  function startSystem() {
    typeEffect();
  }
  function typeEffect() {
    if(i < messages.length) {
      textElement.innerHTML = messages[i];
      if(messages[i] === "Gwapo ko? 😎") {
        textElement.style.fontSize = "45px";
        textElement.style.color = "#ffcc00";
      } else {
        textElement.style.fontSize = "40px";
        textElement.style.color = "#00ffcc";
      }
      i++;
      setTimeout(typeEffect, messages[i-1] === "Gwapo ko? 😎" ? 800 : 400);
    }
  }

  // Smooth NO Button Movement
  const noBtn = document.getElementById("noBtn");
  noBtn.addEventListener("mouseover", () => {
    const w = noBtn.offsetWidth, h = noBtn.offsetHeight;
    let x = Math.random() * (window.innerWidth - w);
    let y = Math.random() * (window.innerHeight - h);
    const yesRect = document.getElementById("yesBtn").getBoundingClientRect();
    if(Math.abs(x - yesRect.left) < 150 && Math.abs(y - yesRect.top) < 150) {
      x = x < yesRect.left ? x - 150 : x + 150;
      y = y < yesRect.top ? y - 150 : y + 150;
    }
    x = Math.max(0, Math.min(x, window.innerWidth - w));
    y = Math.max(0, Math.min(y, window.innerHeight - h));
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // Smooth YES Button Magnet
  document.addEventListener("mousemove", (e) => {
    const yes = document.getElementById("yesBtn");
    const rect = yes.getBoundingClientRect();
    const dx = rect.left - e.clientX;
    const dy = rect.top - e.clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 150) {
      const newLeft = Math.max(0, Math.min(rect.left - dx*0.2, window.innerWidth - yes.offsetWidth));
      const newTop = Math.max(0, Math.min(rect.top - dy*0.2, window.innerHeight - yes.offsetHeight));
      yes.style.left = newLeft + "px";
      yes.style.top = newTop + "px";
    }
  });

  // Smooth YES Click with Confetti
  function yesClicked() {
    for(let j=0; j<150; j++) {
      const confetti = document.createElement("div");
      confetti.style.position = "absolute";
      confetti.style.width = Math.random()*10 + 5 + "px";
      confetti.style.height = Math.random()*10 + 5 + "px";
      confetti.style.backgroundColor = ["#ff00ff", "#00ffcc", "#ffcc00", "#fff", "#ff3333"][Math.floor(Math.random()*5)];
      confetti.style.left = Math.random()*100 + "%";
      confetti.style.top = "-20px";
      confetti.style.borderRadius = "50%";
      confetti.style.animation = fall ${Math.random()*2 + 1}s linear forwards;
      document.body.appendChild(confetti);
    }
    textElement.innerHTML =💖 CONNECTION ACCEPTED 💖<br><br>Hi Glen James Oyangoren! 😍<br>Gwapo ka talaga!<br><br>You're stuck with me now 😎`;
    textElement.style.fontSize = "35px";
    textElement.style.color = "#ff66b3";
    textElement.style.textShadow = "0 0 15px #ff66b3";
    mainSystem.style.background = "#ffe6f2";
    mainSystem.style.backgroundImage = "radial-gradient(circle, rgba(255,102,179,0.1) 1px, transparent 1px)";
    yesBtn.remove(); noBtn.remove();
  }
</script>
</body>
</html>
